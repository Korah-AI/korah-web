<!DOCTYPE html>
<html lang="en" x-data="{ theme: localStorage.getItem('korah_theme') || 'dark' }" :data-theme="theme" x-cloak>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Korah AI — Create Practice Test</title>
  <link rel="icon" type="image/png" href="../app/logo.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../app/korah-chat.css"/>
  <style>
    .react-container { height: 100%; display: flex; flex-direction: column; }
    .glass-card { background: var(--sf); backdrop-filter: blur(20px); border: 1px solid var(--bd); border-radius: 24px; }
    .input-field { background: var(--bg2); border: 1px solid var(--bd); border-radius: 14px; color: var(--tx); transition: all 0.2s; }
    .input-field:focus { border-color: var(--p4); box-shadow: 0 0 0 4px var(--glow); outline: none; }
    .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .question-item { background: var(--bg2); border: 1px solid var(--bd); border-radius: 20px; }
    .option-row { background: var(--bg3); border-radius: 12px; border: 1px solid var(--bd2); }
    .loading-spinner { border: 3px solid rgba(139, 92, 246, 0.1); border-top: 3px solid var(--p4); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-base tx overflow-hidden h-screen">
  <canvas id="bg-canvas" class="fixed inset-0 z-0 pointer-events-none"></canvas>

  <aside id="sidebar" class="sidebar bg-sf glass t-theme">
    <div class="sidebar-header">
      <a href="../index.html" class="flex items-center gap-2.5 no-underline">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center font-display text-xl font-black text-white shadow-glow logo-btn">
          <span class="logo-letter"><img src="../app/logo.png" alt="Korah"/></span>
        </div>
        <div class="flex flex-col leading-tight">
          <span class="font-display text-[19px] font-bold tx">Korah</span>
          <span class="text-[9px] font-semibold tracking-[2.5px] uppercase tx-p4">Study Smarter</span>
        </div>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-row">
        <a href="../index.html" class="sidebar-nav-link t-btn"><span class="nav-icon">💬</span> <span class="nav-text">Chat</span></a>
        <a href="feed.html" class="sidebar-nav-link active t-btn"><span class="nav-icon">📚</span> <span class="nav-text"></span></a>
      </div>
      <a href="../productivity.html" class="sidebar-nav-link productivity-link t-btn"><span class="nav-icon">⏱️</span> <span class="nav-text">Productivity</span></a>
    </nav>
    <div class="sidebar-middle">
      <div class="flex items-center justify-between px-1 flex-shrink-0" style="margin: 12px 0 4px;">
        <span class="sidebar-section-label" style="margin:0">Recent Study Items</span>
      </div>
      <div id="study-items-history" class="chat-history"></div>
    </div>
  </aside>

  <main class="main-content flex-1 flex flex-col relative z-10 overflow-hidden">
    <header class="chat-topbar bg-sf glass-sm t-theme bd flex items-center justify-between px-6 h-16 shrink-0">
      <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="sidebar-toggle-btn t-btn tx2" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="logo-container" style="display: flex; align-items: center;">
          <img src="../app/logo.png" alt="Korah Logo" style="height: 32px; width: auto;">
        </div>
        <div class="korah-status-dot"></div>
        <span class="font-semibold tx text-sm">Practice Test Creator</span>
      </div>
      <a href="feed.html" class="tx2 hover:tx transition-colors text-sm font-medium">Cancel</a>
    </header>

    <div id="react-root" class="flex-1 overflow-y-auto p-6 md:p-10"></div>
  </main>

<script type="module" src="js/study-firebase-init.js"></script>
<script src="../app/timer-manager.js"></script>
<script src="js/sidebar.js"></script>
  <script src="js/study-api.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TestCreator = () => {
      const [method, setMethod] = useState('manual');
      const [title, setTitle] = useState('');
      const [subject, setSubject] = useState('');
      const [description, setDescription] = useState('');
      const [tags, setTags] = useState('');
      const [questions, setQuestions] = useState([{ 
        id: Date.now(), 
        type: 'mcq', 
        text: '', 
        options: ['', '', '', ''], 
        answer: '', 
        explanation: '' 
      }]);
      const [config, setConfig] = useState({ total: 10, mcq: 6, open: 4 });
      const [prompt, setPrompt] = useState('');
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      // Keep counts in sync
      useEffect(() => {
        const total = config.total || 0;
        const mcq = config.mcq || 0;
        const open = total - mcq;
        if (config.open !== open) {
          setConfig(prev => ({ ...prev, open: open < 0 ? 0 : open }));
        }
      }, [config.total, config.mcq]);

      useEffect(() => {
        if (typeof KorahSidebar !== 'undefined') {
          KorahSidebar.initSidebar({ chatBaseUrl: "../index.html", itemPageUrl: "item.html" });
        }
      }, []);

      const addQuestion = () => setQuestions([...questions, { 
        id: Date.now(), 
        type: 'mcq', 
        text: '', 
        options: ['', '', '', ''], 
        answer: '', 
        explanation: '' 
      }]);

      const removeQuestion = (id) => setQuestions(questions.filter(q => q.id !== id));

      const updateQuestion = (id, field, value) => {
        setQuestions(questions.map(q => q.id === id ? { ...q, [field]: value } : q));
      };

      const handleFileChange = (e) => {
        const newFiles = Array.from(e.target.files).slice(0, 5 - files.length);
        setFiles([...files, ...newFiles]);
      };

      const validate = () => {
        if (!title.trim()) return "Title is required";
        if (!subject.trim()) return "Subject is required";
        if (method === 'manual') {
          const validQs = questions.filter(q => q.text.trim() && (q.type === 'mcq' ? q.answer : q.answer.trim()));
          if (validQs.length < 1) return "At least one complete question is required";
        }
        if (method === 'prompt' && !prompt.trim()) return "AI prompt is required";
        if (method === 'docs' && files.length === 0) return "At least one document is required";
        return null;
      };

      const saveItem = (content) => {
        const id = "study_" + Date.now();
        const item = {
          id,
          type: "practiceTest",
          title,
          description,
          subject,
          tags: tags.split(',').map(t => t.trim()).filter(Boolean),
          content: content || { questions: [], testConfig: { totalQuestions: 0, mcqCount: 0, openEndedCount: 0 } },
          source: method === 'manual' ? 'manual' : (method === 'prompt' ? 'ai-prompt' : 'ai-doc'),
          createdBy: "cloud",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        if (window.KorahDB) window.KorahDB.setStudyItem(id, item);
        window.location.href = "test.html?id=" + encodeURIComponent(id);
      };

      const handleCreate = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        setError('');
        
        if (method === 'manual') {
          const finalQs = questions.filter(q => q.text.trim()).map(q => ({
            type: q.type,
            text: q.text,
            options: q.type === 'mcq' ? q.options : [],
            answer: q.answer,
            explanation: q.explanation
          }));
          saveItem({
            questions: finalQs,
            testConfig: {
              totalQuestions: finalQs.length,
              mcqCount: finalQs.filter(q => q.type === 'mcq').length,
              openEndedCount: finalQs.filter(q => q.type === 'openEnded').length
            }
          });
          return;
        }

        setLoading(true);
        try {
          const result = await KorahStudyAPI.generateStudyContent({
            type: "practiceTest",
            prompt: method === 'prompt' ? prompt : `Create a practice test from the uploaded documents for ${subject}`,
            title,
            subject,
            files: method === 'docs' ? files : [],
            testConfig: {
              totalQuestions: config.total,
              mcqCount: config.mcq,
              openEndedCount: config.open
            }
          });

          if (result && result.content && result.content.questions) {
            saveItem(result.content);
          } else {
            throw new Error("Invalid content generated by AI");
          }
        } catch (err) {
          setError(err.message || "AI generation failed. Please try again.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-4xl mx-auto space-y-8 pb-20">
          <div className="text-center space-y-2">
            <h1 className="text-4xl font-display font-black grad-text">Create Practice Test</h1>
            <p className="tx2">Challenge yourself and simulate exam conditions with AI-crafted tests.</p>
          </div>

          <div className="flex p-1 bg-sf2 glass-sm bd rounded-2xl w-fit mx-auto">
            {['manual', 'prompt', 'docs'].map(m => (
              <button
                key={m}
                onClick={() => setMethod(m)}
                className={`px-6 py-2.5 rounded-xl text-sm font-bold tab-btn ${method === m ? 'bg-p4 text-white shadow-glow' : 'tx3 hover:tx2'}`}
              >
                {m === 'manual' ? '✏️ Manual' : m === 'prompt' ? '💬 AI Prompt' : '📄 From Docs'}
              </button>
            ))}
          </div>

          <div className="glass-card p-8 space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="space-y-2">
                <label className="text-xs font-bold uppercase tracking-wider tx3">Title *</label>
                <input 
                  type="text" 
                  value={title} 
                  onChange={e => setTitle(e.target.value)}
                  placeholder="e.g., AP History Midterm Prep"
                  className="w-100 p-3.5 input-field w-full"
                />
              </div>
              <div className="space-y-2">
                <label className="text-xs font-bold uppercase tracking-wider tx3">Subject *</label>
                <input 
                  type="text" 
                  value={subject} 
                  onChange={e => setSubject(e.target.value)}
                  placeholder="e.g., History"
                  className="w-100 p-3.5 input-field w-full"
                />
              </div>
            </div>

            <div className="space-y-2">
              <label className="text-xs font-bold uppercase tracking-wider tx3">Description</label>
              <textarea 
                value={description} 
                onChange={e => setDescription(e.target.value)}
                placeholder="Details about the exam format or scope..."
                className="w-full p-3.5 input-field h-20 resize-none"
              />
            </div>

            {method === 'manual' ? (
              <div className="space-y-8 pt-4">
                <div className="flex items-center justify-between">
                  <label className="text-xs font-bold uppercase tracking-wider tx3">Questions</label>
                  <button onClick={addQuestion} className="tx-p4 font-bold text-xs hover:underline">+ Add Question</button>
                </div>
                <div className="space-y-6">
                  {questions.map((q, idx) => (
                    <div key={q.id} className="question-item p-6 space-y-4 relative group bd">
                      <div className="flex items-center justify-between">
                        <span className="text-sm font-bold tx-p4">Question {idx + 1}</span>
                        <div className="flex items-center gap-4">
                          <select 
                            value={q.type} 
                            onChange={e => updateQuestion(q.id, 'type', e.target.value)}
                            className="bg-transparent tx3 text-xs font-bold border-none outline-none cursor-pointer"
                          >
                            <option value="mcq">Multiple Choice</option>
                            <option value="openEnded">Open Ended</option>
                          </select>
                          <button onClick={() => removeQuestion(q.id)} className="tx3 hover:tx-red transition-colors text-lg">&times;</button>
                        </div>
                      </div>
                      
                      <textarea 
                        value={q.text}
                        onChange={e => updateQuestion(q.id, 'text', e.target.value)}
                        placeholder="Enter the question text..."
                        className="w-full p-4 bg-base2 bd rounded-xl tx text-sm h-20 resize-none focus:border-p4 outline-none"
                      />

                      {q.type === 'mcq' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {q.options.map((opt, oIdx) => (
                            <div key={oIdx} className={`flex items-center gap-3 p-3 option-row transition-all ${q.answer === opt && opt !== '' ? 'border-p4 shadow-glow-sm' : ''}`}>
                              <input 
                                type="radio" 
                                name={`correct-${q.id}`} 
                                checked={q.answer === opt && opt !== ''}
                                onChange={() => updateQuestion(q.id, 'answer', opt)}
                                className="w-4 h-4 accent-p4"
                              />
                              <input 
                                type="text"
                                value={opt}
                                onChange={e => {
                                  const newOpts = [...q.options];
                                  newOpts[oIdx] = e.target.value;
                                  updateQuestion(q.id, 'options', newOpts);
                                }}
                                placeholder={`Option ${String.fromCharCode(65 + oIdx)}`}
                                className="flex-1 bg-transparent tx text-sm outline-none"
                              />
                            </div>
                          ))}
                        </div>
                      ) : (
                        <textarea 
                          value={q.answer}
                          onChange={e => updateQuestion(q.id, 'answer', e.target.value)}
                          placeholder="Enter the correct answer/key points..."
                          className="w-full p-4 bg-base2 bd rounded-xl tx text-sm h-24 resize-none focus:border-p4 outline-none"
                        />
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="space-y-6 pt-4">
                <div className="space-y-4">
                  <label className="text-xs font-bold uppercase tracking-wider tx3 text-center block">Test Configuration</label>
                  <div className="grid grid-cols-3 gap-4">
                    <div className="space-y-2 p-4 bg-base2 bd rounded-2xl text-center">
                      <label className="text-[10px] font-bold uppercase tx3">Total Items</label>
                      <input 
                        type="number" value={config.total} 
                        onChange={e => setConfig({...config, total: parseInt(e.target.value)})}
                        className="bg-transparent text-xl font-black tx w-full text-center outline-none"
                      />
                    </div>
                    <div className="space-y-2 p-4 bg-base2 bd rounded-2xl text-center">
                      <label className="text-[10px] font-bold uppercase tx3">MCQ Count</label>
                      <input 
                        type="number" value={config.mcq} 
                        onChange={e => setConfig({...config, mcq: parseInt(e.target.value)})}
                        className="bg-transparent text-xl font-black tx-p4 w-full text-center outline-none"
                      />
                    </div>
                    <div className="space-y-2 p-4 bg-base2 bd rounded-2xl text-center">
                      <label className="text-[10px] font-bold uppercase tx3">Open Ended</label>
                      <input 
                        type="number" value={config.open} 
                        onChange={e => setConfig({...config, open: parseInt(e.target.value)})}
                        className="bg-transparent text-xl font-black tx-ac w-full text-center outline-none"
                      />
                    </div>
                  </div>
                </div>

                {method === 'prompt' ? (
                  <div className="space-y-2">
                    <label className="text-xs font-bold uppercase tracking-wider tx3">Generation Prompt *</label>
                    <textarea 
                      value={prompt} onChange={e => setPrompt(e.target.value)}
                      placeholder="e.g., Create a challenging practice test on Organic Chemistry nomenclature and stereochemistry."
                      className="w-full p-4 input-field h-32 resize-none"
                    />
                  </div>
                ) : (
                  <div className="space-y-4">
                    <label className="text-xs font-bold uppercase tracking-wider tx3">Document Sources</label>
                    <div 
                      className="upload-zone border-2 border-dashed border-bd rounded-2xl p-10 text-center hover:border-p4 transition-all cursor-pointer bg-base2/30"
                      onClick={() => document.getElementById('file-upload').click()}
                    >
                      <input id="file-upload" type="file" multiple className="hidden" onChange={handleFileChange} />
                      <span className="text-3xl mb-2 block">🎯</span>
                      <p className="tx">Drop textbook pages or notes here</p>
                      <p className="tx3 text-xs mt-1">Maximum 5 files (PDF, Image, Text)</p>
                    </div>
                    {files.length > 0 && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {files.map((f, i) => (
                          <div key={i} className="flex items-center justify-between p-3 bg-base2 bd rounded-xl">
                            <span className="text-xs tx truncate max-w-[200px]">{f.name}</span>
                            <button onClick={() => setFiles(files.filter((_, idx) => idx !== i))} className="tx3 hover:tx-red">✕</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <div className="pt-6 border-t bd flex flex-col items-center gap-4">
              {error && <p className="text-red-400 text-sm font-medium">⚠️ {error}</p>}
              <button 
                onClick={handleCreate}
                disabled={loading}
                className="w-full md:w-64 py-4 rounded-2xl grad-bg text-white font-black shadow-glow hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
              >
                {loading ? <div className="loading-spinner"></div> : (method === 'manual' ? 'Create Test' : 'Generate with AI')}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('react-root'));
    root.render(<TestCreator />);
  </script>
</body>
</html>
