<!DOCTYPE html>
<html lang="en" x-data="{ theme: localStorage.getItem('korah_theme') || 'dark' }" :data-theme="theme" x-cloak>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Korah AI — Create Study Guide</title>
  <link rel="icon" type="image/png" href="../app/logoresized.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../app/korah-chat.css"/>
  <style>
    .react-container { height: 100%; display: flex; flex-direction: column; }
    .glass-card { background: var(--sf); backdrop-filter: blur(20px); border: 1px solid var(--bd); border-radius: 24px; }
    .input-field { background: var(--bg2); border: 1px solid var(--bd); border-radius: 14px; color: var(--tx); transition: all 0.2s; }
    .input-field:focus { border-color: var(--p4); box-shadow: 0 0 0 4px var(--glow); outline: none; }
    .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .loading-spinner { border: 3px solid rgba(139, 92, 246, 0.1); border-top: 3px solid var(--p4); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-base tx overflow-hidden h-screen">
  <canvas id="bg-canvas" class="fixed inset-0 z-0 pointer-events-none"></canvas>

  <aside id="sidebar" class="sidebar bg-sf glass t-theme">
  <div class="sidebar-header">

      </div>

        <span class="font-display text-[19px] font-bold tx">Korah</span>
        <span class="text-[9px] font-semibold tracking-[2.5px] uppercase tx-p4">Study Smarter</span>
      </div>
    </a>
    <button id="new-chat-btn" class="new-chat-btn text-white text-xs font-bold px-4 py-2 rounded-full border-none cursor-pointer shadow-glow t-btn">
      <span class="new-chat-icon">+</span> <span class="new-chat-text">New Chat</span>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-nav-row">
      <a href="../index.html" class="sidebar-nav-link t-btn"><span class="nav-icon">💬</span> <span class="nav-text">Chat</span></a>
      <a href="feed.html" class="sidebar-nav-link t-btn"><span class="nav-icon">📚</span> <span class="nav-text">Study</span></a>
    </div>
    <a href="../sat/index.html" class="sidebar-nav-link t-btn" data-sat-link="true"><span class="nav-icon">📝</span> <span class="nav-text">SAT</span></a>
    <a href="../productivity.html" class="sidebar-nav-link productivity-link t-btn"><span class="nav-icon">⏱️</span> <span class="nav-text">Productivity</span></a>
  </nav>

  <div class="flex items-center justify-between px-1 flex-shrink-0" style="margin: 0.75rem 0 0.25rem;">
    <span class="sidebar-section-label" style="margin:0">Recent Chats</span>
  </div>
  <div class="sidebar-middle">
    <div class="select-bar-wrapper">
      <div id="chat-select-bar" class="select-bar">
        <span class="select-bar-count" id="chat-select-count">0 selected</span>

            </svg>
          </button>
          <button class="select-bar-btn danger" id="chat-delete-selected" title="Delete selected"></button>
        </div>
      </div>
    </div>
    <div id="chat-history" class="chat-history">
      <div class="skeleton-item">
        <div class="skeleton-icon"></div>
        <div class="skeleton-text"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-icon"></div>
        <div class="skeleton-text"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-icon"></div>
        <div class="skeleton-text"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-icon"></div>
        <div class="skeleton-text"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-icon"></div>
        <div class="skeleton-text"></div>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-between px-1 flex-shrink-0" style="margin: 0.75rem 0 0.25rem;">
    <span class="sidebar-section-label" style="margin:0">Recent Study Items</span>
  </div>
  <div class="sidebar-middle">
    <div class="select-bar-wrapper">
      <div id="study-select-bar" class="select-bar">
        <span class="select-bar-count" id="study-select-count">0 selected</span>
        <div class="select-bar-actions">
          <button class="select-bar-btn" id="study-select-all" title="Select all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
          <button class="select-bar-btn" id="study-deselect-all" title="Deselect all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <button class="select-bar-btn danger" id="study-delete-selected" title="Delete selected"></button>
        </div>
      </div>
    </div>
    <div id="study-items-history" class="chat-history">
    </div>
    <div id="study-items-empty" class="study-items-empty hidden">
      <span class="study-items-empty-icon" aria-hidden="true">📚</span>
      <div class="study-items-empty-title">No study items yet</div>
      <div class="study-items-empty-sub">Create one to see it here.</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="mood-indicator" id="sidebar-mood">
      <span class="mood-dot" id="mood-dot">🟢</span>
      <span class="text-xs tx2 font-medium">Full Focus Mode</span>
    </div>
    <div class="sidebar-footer-actions">
      <button id="logout-btn" class="theme-toggle-small t-btn" title="Log out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>

          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <button id="settings-btn" class="theme-toggle-small t-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button @click="theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('korah_theme', theme)" class="theme-toggle-small t-btn" title="Toggle theme">
        <svg x-show="theme==='light'" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" style="color:var(--p5)">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
        <svg x-show="theme==='dark'" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--p4)">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</aside>

<!-- Settings Modal -->
<div id="settings-modal" class="settings-modal">
  <div class="settings-modal-content">
    <div class="settings-header">
      <h2 class="settings-title">Settings</h2>
      <button class="settings-close" id="settings-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3 class="settings-section-title">Appearance</h3>
        <div class="settings-item">
          <div class="settings-item-label">Theme</div>
          <div class="settings-item-control">
            <select id="settings-theme-select" class="settings-select">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="system">System</option>
            </select>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title">Profile</h3>
        <div class="settings-item">
          <div class="settings-item-label">Display Name</div>
          <div class="settings-item-control">
            <input type="text" id="settings-name-input" class="settings-input" placeholder="Your name">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title">Data</h3>
        <div class="settings-item">
          <div class="settings-item-label">Clear All Data</div>
          <div class="settings-item-control">
            <button id="settings-clear-data" class="settings-btn danger">Clear Data</button>
          </div>
        </div>
      </div>
      <div class="settings-actions">
        <button id="settings-save" class="settings-btn primary">Save Settings</button>
      </div>
    </div>
  </div>
</div>

  <main class="main-content flex-1 flex flex-col relative z-10 overflow-hidden">
    <header class="chat-topbar bg-sf glass-sm t-theme bd flex items-center justify-between px-6 h-16 shrink-0">
      <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="sidebar-toggle-btn t-btn tx2" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="logo-container" style="display: flex; align-items: center;">
          <img src="../app/logo.png" alt="Korah Logo" style="height: 32px; width: auto;">
        </div>
        <div class="korah-status-dot"></div>
        <span class="font-semibold tx text-sm">Study Guide Creator</span>
      </div>
      <a href="feed.html" class="tx2 hover:tx transition-colors text-sm font-medium">Cancel</a>
    </header>

    <div id="react-root" class="flex-1 overflow-y-auto p-6 md:p-10"></div>
  </main>

<script type="module" src="js/study-firebase-init.js"></script>
<script src="../app/timer-manager.js"></script>
<script src="js/sidebar.js"></script>
  <script src="js/study-api.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GuideCreator = () => {
      const [method, setMethod] = useState('manual');
      const [title, setTitle] = useState('');
      const [subject, setSubject] = useState('');
      const [description, setDescription] = useState('');
      const [tags, setTags] = useState('');
      const [markdown, setMarkdown] = useState('');
      const [prompt, setPrompt] = useState('');
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        if (typeof KorahSidebar !== 'undefined') {
          KorahSidebar.initSidebar({ chatBaseUrl: "../index.html", itemPageUrl: "item.html" });
        }
      }, []);

      const handleFileChange = (e) => {
        const newFiles = Array.from(e.target.files).slice(0, 5 - files.length);
        setFiles([...files, ...newFiles]);
      };

      const validate = () => {
        if (!title.trim()) return "Title is required";
        if (!subject.trim()) return "Subject is required";
        if (method === 'manual' && !markdown.trim()) return "Content is required";
        if (method === 'prompt' && !prompt.trim()) return "AI prompt is required";
        if (method === 'docs' && files.length === 0) return "At least one document is required";
        return null;
      };

      const saveItem = (content) => {
        const id = "study_" + Date.now();
        const item = {
          id,
          type: "studyGuide",
          title,
          description,
          subject,
          tags: tags.split(',').map(t => t.trim()).filter(Boolean),
          content: content || { title, markdown: "" },
          source: method === 'manual' ? 'manual' : (method === 'prompt' ? 'ai-prompt' : 'ai-doc'),
          createdBy: "cloud",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        if (window.KorahDB) window.KorahDB.setStudyItem(id, item);
        window.location.href = "guide.html?id=" + encodeURIComponent(id);
      };

      const handleCreate = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        setError('');
        
        if (method === 'manual') {
          saveItem({ title, markdown });
          return;
        }

        setLoading(true);
        try {
          const result = await KorahStudyAPI.generateStudyContent({
            type: "studyGuide",
            prompt: method === 'prompt' ? prompt : `Create a study guide from the uploaded documents for ${subject}`,
            title,
            subject,
            files: method === 'docs' ? files : []
          });

          if (result && result.content && result.content.markdown) {
            saveItem(result.content);
          } else {
            throw new Error("Invalid content generated by AI");
          }
        } catch (err) {
          setError(err.message || "AI generation failed. Please try again.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-4xl mx-auto space-y-8 pb-20">
          <div className="text-center space-y-2">
            <h1 className="text-4xl font-display font-black grad-text">Create Study Guide</h1>
            <p className="tx2">Synthesize complex topics into elegant, structured learning guides.</p>
          </div>

          <div className="flex p-1 bg-sf2 glass-sm bd rounded-2xl w-fit mx-auto">
            {['manual', 'prompt', 'docs'].map(m => (
              <button
                key={m}
                onClick={() => setMethod(m)}
                className={`px-6 py-2.5 rounded-xl text-sm font-bold tab-btn ${method === m ? 'bg-p4 text-white shadow-glow' : 'tx3 hover:tx2'}`}
              >
                {m === 'manual' ? '✏️ Manual' : m === 'prompt' ? '💬 AI Prompt' : '📄 From Docs'}
              </button>
            ))}
          </div>

          <div className="glass-card p-8 space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="space-y-2">
                <label className="text-xs font-bold uppercase tracking-wider tx3">Title *</label>
                <input 
                  type="text" 
                  value={title} 
                  onChange={e => setTitle(e.target.value)}
                  placeholder="e.g., Quantum Mechanics Masterclass"
                  className="w-100 p-3.5 input-field w-full"
                />
              </div>
              <div className="space-y-2">
                <label className="text-xs font-bold uppercase tracking-wider tx3">Subject *</label>
                <input 
                  type="text" 
                  value={subject} 
                  onChange={e => setSubject(e.target.value)}
                  placeholder="e.g., Physics"
                  className="w-100 p-3.5 input-field w-full"
                />
              </div>
            </div>

            <div className="space-y-2">
              <label className="text-xs font-bold uppercase tracking-wider tx3">Description</label>
              <textarea 
                value={description} 
                onChange={e => setDescription(e.target.value)}
                placeholder="Briefly describe what this guide covers..."
                className="w-full p-3.5 input-field h-20 resize-none"
              />
            </div>

            {method === 'manual' && (
              <div className="space-y-4 pt-4">
                <div className="flex items-center justify-between">
                  <label className="text-xs font-bold uppercase tracking-wider tx3">Guide Content (Markdown) *</label>
                  <span className="text-[10px] tx3 font-bold opacity-50 uppercase tracking-widest">Supports Markdown</span>
                </div>
                <textarea 
                  value={markdown} 
                  onChange={e => setMarkdown(e.target.value)}
                  placeholder="# Section 1: Introduction\n\nExplain key concepts here..."
                  className="w-full p-6 input-field h-96 font-mono text-sm resize-none"
                />
              </div>
            )}

            {method === 'prompt' && (
              <div className="space-y-2 pt-4">
                <label className="text-xs font-bold uppercase tracking-wider tx3">AI Generation Prompt *</label>
                <textarea 
                  value={prompt} 
                  onChange={e => setPrompt(e.target.value)}
                  placeholder="e.g., Generate a detailed study guide for the French Revolution, covering key figures, major events from 1789 to 1799, and long-term societal impacts."
                  className="w-full p-3.5 input-field h-40 resize-none"
                />
              </div>
            )}

            {method === 'docs' && (
              <div className="space-y-4 pt-4">
                <label className="text-xs font-bold uppercase tracking-wider tx3">Upload Documents</label>
                <div 
                  className="upload-zone border-2 border-dashed border-bd rounded-2xl p-10 text-center hover:border-p4 transition-all cursor-pointer bg-base2/30"
                  onClick={() => document.getElementById('file-upload').click()}
                >
                  <input id="file-upload" type="file" multiple className="hidden" onChange={handleFileChange} />
                  <span className="text-3xl mb-2 block">📄</span>
                  <p className="tx">Drop study materials here or click to upload</p>
                  <p className="tx3 text-xs mt-1">PDF, TXT, or images (Max 5)</p>
                </div>
                {files.length > 0 && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {files.map((file, i) => (
                      <div key={i} className="flex items-center justify-between p-3 bg-base2 bd rounded-xl">
                        <span className="text-xs tx truncate max-w-[200px]">{file.name}</span>
                        <button onClick={(e) => {e.stopPropagation(); setFiles(files.filter((_, idx) => idx !== i))}} className="tx-red hover:text-red-400">✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div className="pt-6 border-t bd flex flex-col items-center gap-4">
              {error && <p className="text-red-400 text-sm font-medium">⚠️ {error}</p>}
              <button 
                onClick={handleCreate}
                disabled={loading}
                className="w-full md:w-64 py-4 rounded-2xl grad-bg text-white font-black shadow-glow hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
              >
                {loading ? <div className="loading-spinner"></div> : (method === 'manual' ? 'Create Guide' : 'Generate with AI')}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('react-root'));
    root.render(<GuideCreator />);
  </script>
</body>
</html>
