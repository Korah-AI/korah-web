<!DOCTYPE html>
<html lang="en" x-data="{ tab: 'login' }" x-cloak>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Korah AI — Login</title>
<link rel="icon" type="image/png" href="app/logoresized.png">

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #06040f;
    --bg2: #0d0920;
    --bg3: #120c28;
    --sf: rgba(18, 12, 40, 0.7);
    --sf2: rgba(30, 18, 60, 0.6);
    --bd: rgba(139, 92, 246, 0.2);
    --bd2: rgba(139, 92, 246, 0.1);
    --tx: #f0eaff;
    --tx2: #a89dc0;
    --tx3: #6b5f88;
    --p4: #8b5cf6;
    --p5: #a78bfa;
    --ac: #f0abfc;
    --glow: rgba(139, 92, 246, 0.35);
    --nb: rgba(6, 4, 15, 0.85);
    --cb: rgba(15, 9, 35, 0.82);
    --cu: rgba(91, 33, 182, 0.25);
    --ca: rgba(18, 12, 40, 0.9);
  }

  * { box-sizing: border-box; }
  
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--tx);
    min-height: 100vh;
    margin: 0;
  }

  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at center, var(--bg2) 0%, var(--bg) 100%);
    filter: blur(1px);
    opacity: 0.8;
  }

  .login-container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: var(--cb);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--bd);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
  }

  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 88px;
    height: 88px;
    border-radius: 14px;
    background: #5a21b6a9;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px var(--glow);
  }

  .font-display {
    font-family: 'Plus Jakarta Sans', serif;
  }

  .login-title {
    font-family: 'Plus Jakarta Sans', serif;
    font-size: 48px;
    font-weight: 900;
    text-align: center;
    margin: 0 0 8px;
    background: linear-gradient(135deg, var(--p4), var(--ac));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .login-subtitle {
    color: var(--tx2);
    text-align: center;
    font-size: 18px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-row {
    display: flex;
    gap: 12px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--tx2);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--bd);
    background: var(--sf);
    color: var(--tx);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--p4);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
  }

  .form-input::placeholder {
    color: var(--tx3);
  }

  .btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    color: white;
  }

  .btn-google {
    background: var(--sf);
    color: var(--tx);
    border: 1px solid var(--bd);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-google:hover {
    background: var(--bd);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
    color: var(--tx3);
    font-size: 13px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--bd);
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--sf);
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--tx2);
    border: none;
    font-family: inherit;
  }

  .tab.active {
    background: var(--cu);
    color: var(--p5);
    border: 1px solid var(--bd);
  }

  .error-msg {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .error-msg.show {
    display: block;
  }

  .grad-bg {
    background: linear-gradient(135deg, #5b21b6, var(--p4));
    transition: filter .3s, transform .3s, box-shadow .3s;
  }

  .grad-bg:hover {
    filter: brightness(1.15);
    transform: translateY(-1px);
    box-shadow: 0 0 20px var(--glow);
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="bg-canvas"></div>

<!-- Top Left Logo -->
<div style="position: fixed; top: 1.25rem; left: 1.25rem; z-index: 10;">
  <img src="app/logo.png" alt="Korah Logo" style="height: 2.5rem; width: auto;">
</div>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <img src="app/logo.png" alt="Korah"/>
      </div>
    </div>
    <h1 class="login-title">Korah A.I</h1>
    <p class="login-subtitle">Sign in to continue your learning journey</p>

    <div class="tabs">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Create Account</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary grad-bg">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="hidden">
      <div class="form-row form-group">
        <div style="flex:1">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" id="register-firstname" placeholder="John" required>
        </div>
        <div style="flex:1">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" id="register-lastname" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="register-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="register-password" placeholder="Create a password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary grad-bg">Create Account</button>
    </form>

    <div class="divider">or continue with</div>

    <button id="google-btn" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvabVNkVMfjKl1m3dQSlW06h-iomgcNJM",
    authDomain: "korah-app.firebaseapp.com",
    projectId: "korah-app",
    storageBucket: "korah-app.firebasestorage.app",
    messagingSenderId: "226169460321",
    appId: "1:226169460321:web:b166fc8260107c55dafc20"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const errorMsg = document.getElementById('error-msg');
  const tabs = document.querySelectorAll('.tab');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function clearError() {
    errorMsg.classList.remove('show');
  }

  function redirectToApp() {
    window.location.href = 'index.html';
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      redirectToApp();
    }
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      clearError();
      
      if (tab.dataset.tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
      }
    });
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      localStorage.setItem('korah_first_name', email.split('@')[0]);
    } catch (error) {
      showError(getErrorMessage(error.code));
    }
  });

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    
    const firstName = document.getElementById('register-firstname').value;
    const lastName = document.getElementById('register-lastname').value;
    const email = document.getElementById('register-email').value;
    const password = document.getElementById('register-password').value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      localStorage.setItem('korah_first_name', firstName);
    } catch (error) {
      showError(getErrorMessage(error.code));
    }
  });

  document.getElementById('google-btn').addEventListener('click', async () => {
    clearError();
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const name = result.user.displayName?.split(' ')[0] || 'there';
      localStorage.setItem('korah_first_name', name);
    } catch (error) {
      showError(getErrorMessage(error.code));
    }
  });

  function getErrorMessage(code) {
    const messages = {
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/operation-not-allowed': 'Operation not allowed.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/user-disabled': 'This account has been disabled.',
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/popup-closed-by-user': 'Sign-in was cancelled.',
      'auth/account-exists-with-different-credential': 'An account already exists with a different sign-in method.'
    };
    return messages[code] || 'An error occurred. Please try again.';
  }
</script>

</body>
</html>
