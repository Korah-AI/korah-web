<!DOCTYPE html>
<html lang="en" x-data="{ theme: localStorage.getItem('korah_theme') || 'dark' }" :data-theme="theme" x-cloak>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Korah AI — Productivity</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
  .productivity-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
    align-items: start;
    animation: fadeUp 0.6s ease-out;
  }
  @media (max-width: 900px) {
    .productivity-container {
      grid-template-columns: 1fr;
      max-width: 600px;
      gap: 24px;
      padding: 20px;
    }
  }
  .productivity-card {
    background: var(--sf2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--bd);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 480px;
  }
  .productivity-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 60px var(--glow);
    border-color: var(--p4);
  }
  .productivity-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 24px;
    color: var(--tx);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.02em;
  }
  .productivity-title::before {
    content: '';
    width: 4px;
    height: 24px;
    background: var(--p4);
    border-radius: 2px;
  }
  .timer-display-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 20px 0;
  }
  .timer-display {
    font-size: 72px;
    font-weight: 800;
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: var(--p5);
    text-shadow: 0 0 30px var(--glow);
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: -0.04em;
  }
  .timer-controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 32px;
  }
  .timer-btn {
    min-width: 140px;
    height: 48px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .todo-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .todo-input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    background: var(--bg);
    padding: 6px;
    border-radius: 16px;
    border: 1px solid var(--bd2);
  }
  .todo-input {
    flex: 1;
    height: 44px;
    background: transparent;
    border: none;
    padding: 0 12px;
    font-size: 15px;
    color: var(--tx);
    outline: none;
  }
  .todo-add-btn {
    height: 44px;
    width: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .todo-list-container {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
    margin-right: -8px;
  }
  .todo-list-container::-webkit-scrollbar { width: 4px }
  .todo-list-container::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px }
  
  .todo-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--sf2);
    border: 1px solid var(--bd2);
    border-radius: 14px;
    transition: all 0.2s ease;
  }
  .todo-item:hover {
    border-color: var(--bd);
    background: var(--sf);
    transform: translateX(4px);
  }
  .todo-item.completed {
    opacity: 0.6;
    background: transparent;
  }
  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--tx3);
  }
  .todo-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid var(--bd);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .todo-checkbox.checked {
    background: var(--p5);
    border-color: var(--p5);
    box-shadow: 0 0 12px var(--glow);
  }
  .todo-text {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: var(--tx);
  }
  .todo-delete {
    opacity: 0;
    transition: all 0.2s;
    cursor: pointer;
    color: var(--tx3);
    padding: 4px;
    border-radius: 6px;
  }
  .todo-delete:hover {
    color: var(--red);
    background: rgba(239,68,68,0.1);
  }
  .todo-item:hover .todo-delete {
    opacity: 1;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--tx3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .empty-icon {
    font-size: 48px;
    opacity: 0.5;
    filter: grayscale(1);
  }
  .empty-state p {
    font-weight: 600;
    font-size: 14px;
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { setupKorahDB } from "../app/data/firestore-store.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvabVNkVMfjKl1m3dQSlW06h-iomgcNJM",
    authDomain: "korah-app.firebaseapp.com",
    projectId: "korah-app",
    storageBucket: "korah-app.firebasestorage.app",
    messagingSenderId: "226169460321",
    appId: "1:226169460321:web:b166fc8260107c55dafc20"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    await setupKorahDB(app, user.uid);
    const detail = { uid: user.uid };
    window._korahReadyFired = detail;
    window.dispatchEvent(new CustomEvent('korahReady', { detail }));
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await signOut(auth);
    localStorage.removeItem('korah_first_name');
    window.location.href = 'login.html';
  });
</script>

<div id="main-area-wrapper" class="main-area-wrapper">

    <!-- Top bar -->

      <button id="sidebar-toggle" class="sidebar-toggle-btn t-btn tx2" aria-label="Toggle sidebar">

    </header>

    <!-- Content -->
    <div class="productivity-container" x-data="productivityApp()">
      <!-- Timer Card -->
      <div class="productivity-card">
        <h2 class="productivity-title">Focus Timer</h2>
        <div class="timer-display-container">
          <div class="timer-display" x-text="formatTime(timeLeft)"></div>
          <div class="flex justify-center gap-3 mt-6">
            <button class="t-btn text-xs font-bold px-4 py-2 rounded-xl" :class="preset === 25 ? 'grad-bg text-white shadow-glow' : 'bg-sf2 bd tx2'" @click="setPreset(25)">25:00</button>
            <button class="t-btn text-xs font-bold px-4 py-2 rounded-xl" :class="preset === 50 ? 'grad-bg text-white shadow-glow' : 'bg-sf2 bd tx2'" @click="setPreset(50)">50:00</button>
            <button class="t-btn text-xs font-bold px-4 py-2 rounded-xl" :class="preset === 10 ? 'grad-bg text-white shadow-glow' : 'bg-sf2 bd tx2'" @click="setPreset(10)">10:00</button>
          </div>
        </div>
        <div class="timer-controls">
          <button class="timer-btn t-btn grad-bg text-white shadow-glow" @click="toggleTimer" x-text="isRunning ? 'Pause' : (timeLeft === totalSeconds ? 'Start' : 'Resume')"></button>
          <button class="timer-btn t-btn bg-sf2 bd tx" @click="resetTimer">Reset</button>
        </div>
      </div>

      <!-- Todo List Card -->
      <div class="productivity-card">
        <h2 class="productivity-title">To-Do List</h2>
        <div class="todo-section">
          <div class="todo-input-row shadow-sm">
            <input type="text" class="todo-input" placeholder="What needs to be done?" x-model="newTask" @keyup.enter="addTask">
            <button class="todo-add-btn t-btn grad-bg text-white" @click="addTask">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
          </div>
          
          <div class="todo-list-container">
            <template x-if="tasks.length === 0">
              <div class="empty-state">
                <div class="empty-icon">📝</div>
                <p>Your list is empty</p>
                <span class="text-xs tx3">Add a task to stay productive!</span>
              </div>
            </template>
            <ul class="todo-list">
              <template x-for="(task, index) in tasks" :key="task.id">
                <li class="todo-item" :class="task.completed ? 'completed' : ''">
                  <button class="todo-checkbox" :class="task.completed ? 'checked' : ''" @click="toggleTask(index)">
                    <svg x-show="task.completed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

                    </svg>
                  </button>
                  <span class="todo-text" x-text="task.text"></span>
                  <button class="todo-delete" @click="removeTask(index)" title="Delete task">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    </svg>
                  </button>

              </template>
            </ul>
          </div>
        </div>
      </div>

<script src="../study/js/sidebar.js"></script>
<script>
  // Initialize sidebar with productivity-specific callbacks
  window.addEventListener('korahReady', () => {
    if (window.KorahSidebar) {
      window.KorahSidebar.initSidebar({
        chatBaseUrl: "../index.html",
        itemPageUrl: "item.html",
        onItemClick: (id) => {
          window.location.href = `item.html?id=${id}`;
        }
      });
    }
  }, { once: true });

  // Productivity app logic
  function productivityApp() {
    return {
      // Timer
      timeLeft: 25 * 60, // default 25 minutes
      totalSeconds: 25 * 60,
      preset: 25,
      isRunning: false,
      timerInterval: null,

      // Todo list
      tasks: [],
      newTask: '',

      init() {
        // Load tasks from localStorage
        const saved = localStorage.getItem('korah_tasks');
        if (saved) {
          try {
            this.tasks = JSON.parse(saved);
          } catch (e) {}
        }
        // Load timer preset from localStorage
        const savedPreset = localStorage.getItem('korah_timer_preset');
        if (savedPreset) {
          this.setPreset(parseInt(savedPreset) || 25);
        }
      },

      // Timer methods
      formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      },

      toggleTimer() {
        if (this.isRunning) {
          this.pauseTimer();
        } else {
          this.startTimer();
        }
      },

      startTimer() {
        if (this.timeLeft <= 0) return;
        this.isRunning = true;
        this.timerInterval = setInterval(() => {
          if (this.timeLeft > 0) {
            this.timeLeft--;
          } else {
            this.pauseTimer();
            this.notifyTimerComplete();
          }
        }, 1000);
      },

      pauseTimer() {
        this.isRunning = false;
        clearInterval(this.timerInterval);
      },

      resetTimer() {
        this.pauseTimer();
        this.timeLeft = this.totalSeconds;
      },

      setPreset(minutes) {
        this.pauseTimer();
        this.preset = minutes;
        this.totalSeconds = minutes * 60;
        this.timeLeft = this.totalSeconds;
        localStorage.setItem('korah_timer_preset', minutes);
      },

      notifyTimerComplete() {
        // Simple alert for now; could be a nicer notification
        alert('Timer completed! Take a break.');
      },

      // Todo methods
      addTask() {
        const text = this.newTask.trim();
        if (!text) return;
        this.tasks.push({
          id: Date.now(),
          text: text,
          completed: false
        });
        this.newTask = '';
        this.saveTasks();
      },

      toggleTask(index) {
        this.tasks[index].completed = !this.tasks[index].completed;
        this.saveTasks();
      },

      removeTask(index) {
        this.tasks.splice(index, 1);
        this.saveTasks();
      },

      saveTasks() {
        localStorage.setItem('korah_tasks', JSON.stringify(this.tasks));
      }
    };
  }
</script>

</body>
